name: file_processor
display_name: "文件处理器"
version: "1.0"
description: "处理多种格式的文件（图片、PDF、Word、Excel、PPT、文本等），提取内容和元数据"
parameters:
  - name: file_path
    type: string
    required: true
    description: "文件路径"
  - name: output_format
    type: string
    required: false
    default: "text"
    enum: ["text", "markdown", "json"]
    description: "输出格式"
returns:
  type: string
  description: "文件处理结果"
entry_point: "processor.py:FileProcessorSkill"
tags: ["file", "document", "pdf", "word", "excel", "ppt"]
enabled: true
