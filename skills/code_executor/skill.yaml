name: code_executor
display_name: "代码执行器"
version: "1.0"
description: "执行Python或Bash代码并返回结果，支持数据分析、数学计算等"
parameters:
  - name: code
    type: string
    required: true
    description: "要执行的代码"
  - name: language
    type: string
    required: false
    default: "python"
    enum: ["python", "bash"]
    description: "编程语言"
returns:
  type: string
  description: "代码执行的输出结果"
entry_point: "executor.py:CodeExecutorSkill"
tags: ["code", "execution", "programming", "data-analysis"]
enabled: true
